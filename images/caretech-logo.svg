<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">CareTech Innovations Logo</title>
  <desc id="desc">Letter C wrapping a compact neural network with input, hidden, and output nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220" />
      <stop offset="100%" stop-color="#050914" />
    </linearGradient>
    <linearGradient id="cStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <linearGradient id="nodeWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#FDBA74" />
    </linearGradient>
    <linearGradient id="nodeCool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#7DD3FC" />
    </linearGradient>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="1.5" y="1.5" width="93" height="93" rx="24" fill="url(#bg)" stroke="#23314C" />

  <path
    d="M62 24c-14 0-26 11-26 24s12 24 26 24c5 0 10-1 14-4"
    fill="none"
    stroke="url(#cStroke)"
    stroke-width="8"
    stroke-linecap="round"
    filter="url(#glowBlue)"
  />

  <g fill="none" stroke-linecap="round">
    <path d="M26 34L45 28M26 34L45 44M26 50L45 28M26 50L45 44M26 50L45 60M26 66L45 44M26 66L45 60" stroke="#38BDF8" stroke-opacity="0.48" stroke-width="2" />
    <path d="M45 28L64 38M45 44L64 38M45 44L64 58M45 60L64 58" stroke="#F97316" stroke-opacity="0.62" stroke-width="2.4" />
    <path d="M26 50L45 44L64 58" stroke="#FDBA74" stroke-opacity="0.85" stroke-width="2.8" />
  </g>

  <g filter="url(#glowBlue)">
    <circle cx="26" cy="34" r="3.8" fill="url(#nodeCool)" />
    <circle cx="26" cy="50" r="3.8" fill="url(#nodeCool)" />
    <circle cx="26" cy="66" r="3.8" fill="url(#nodeCool)" />
    <circle cx="45" cy="28" r="4" fill="url(#nodeWarm)" />
    <circle cx="45" cy="44" r="4" fill="url(#nodeWarm)" />
    <circle cx="45" cy="60" r="4" fill="url(#nodeWarm)" />
    <circle cx="64" cy="38" r="4.2" fill="url(#nodeCool)" />
    <circle cx="64" cy="58" r="4.2" fill="url(#nodeCool)" />
  </g>

  <g fill="#F8FAFC" opacity="0.72">
    <circle cx="26" cy="34" r="1.4" />
    <circle cx="26" cy="50" r="1.4" />
    <circle cx="26" cy="66" r="1.4" />
    <circle cx="45" cy="28" r="1.4" />
    <circle cx="45" cy="44" r="1.4" />
    <circle cx="45" cy="60" r="1.4" />
    <circle cx="64" cy="38" r="1.4" />
    <circle cx="64" cy="58" r="1.4" />
  </g>
</svg>
