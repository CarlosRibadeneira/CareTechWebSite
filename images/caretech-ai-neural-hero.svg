      <stop offset="55%" stop-color="#0B1220" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <filter id="blueGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
