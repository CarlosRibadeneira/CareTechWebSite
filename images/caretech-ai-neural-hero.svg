  <title id="title">CareTech AI Neural Network</title>
  <desc id="desc">Layered neural network illustration with input, hidden, and output nodes connected by weighted blue and orange links.</desc>
  <defs>
    <radialGradient id="bgGlowBlue" cx="24%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
